# Extra bind mounts for bwrap sandbox
# Lines starting with # are comments and will be ignored
# Empty lines are also ignored
# Format: raw bwrap arguments, one "argument" per line
# Note: Arguments with spaces should be on their own lines or quoted

# Example: Python site-packages for different versions
# Use --ro-bind-try for paths that may not exist yet
--ro-bind-try "$HOME/.local/lib/python3.11/site-packages" "$HOME/.local/lib/python3.11/site-packages"
#--ro-bind-try "$HOME/.local/lib/python3.12/site-packages" "$HOME/.local/lib/python3.12/site-packages"

